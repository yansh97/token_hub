name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  workflow_call:

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: 24
  PNPM_VERSION: 11.15.1

jobs:
  release_guard:
    name: Detect pending release
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.release_guard.outputs.is_release }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Detect untagged stable version
        id: release_guard
        run: node scripts/release-guard.mjs

  test:
    name: Test
    needs: release_guard
    # PR/手动运行总是完整测试；main 普通 push 只做轻量版本检测。
    if: >-
      ${{ always() && (github.event_name != 'push' || needs.release_guard.outputs.is_release == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Ensure pnpm store directory exists
        run: node scripts/ensure-pnpm-store.mjs

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run release guard tests
        run: node --test scripts/release-guard.test.mjs

      - name: Run frontend tests
        run: pnpm test:run

      - name: Build frontend
        run: pnpm build

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          # Cargo resolves this manifest to the repository root workspace;
          # cache the root target directory where test artifacts are written.
          workspaces: ". -> target"
          save-if: ${{ github.ref == 'refs/heads/main' }}
          # Keep rustup/cargo binaries from the runner; cached ~/.cargo/bin can shadow cargo.
          cache-bin: "false"
          prefix-key: "v1-rust"

      - name: Run cargo test
        run: cargo test --workspace --locked
