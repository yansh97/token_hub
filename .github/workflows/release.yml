name: Release

on:
  workflow_run:
    workflows: ["Test"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 0.1.0)"
        required: true
      republish:
        description: "Republish an existing stable tag instead of preparing a release PR"
        required: false
        default: "false"

concurrency:
  # 不能只按 branch 做并发键；同一分支上其他 Test 完成也会触发 workflow_run，
  # 进而把当前仍在上传产物的 release run 误取消，导致 release 资产残缺。
  group: release-${{ github.event_name }}-${{ github.event.workflow_run.head_sha || inputs.version || github.ref_name || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: 24
  PNPM_VERSION: 10.13.1

jobs:
  stable_tag:
    name: Resolve release context
    if: |
      (github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push') ||
      (github.event_name == 'workflow_dispatch' && inputs.republish == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.release_guard.outputs.version || steps.manual_release.outputs.version }}
      tag: ${{ steps.create_tag.outputs.tag || steps.manual_release.outputs.tag }}
      release_notes: ${{ steps.release_notes.outputs.release_body }}
      release_matrix: ${{ steps.release_matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v5
        if: github.event_name == 'workflow_run'
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/checkout@v5
        if: github.event_name == 'workflow_dispatch'
        with:
          fetch-depth: 0
          ref: v${{ inputs.version }}

      - name: Release guard
        if: github.event_name == 'workflow_run'
        id: release_guard
        run: node scripts/release-guard.mjs

      - name: Resolve manual release context
        if: github.event_name == 'workflow_dispatch'
        id: manual_release
        shell: bash
        run: |
          version="${{ inputs.version }}"
          tag="v${version}"

          if ! [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Republish version must be x.y.z, got: $version" >&2
            exit 1
          fi

          if ! git rev-parse "$tag^{object}" >/dev/null 2>&1; then
            echo "Tag $tag does not exist on origin." >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Abort if not a release commit
        if: steps.release_guard.outputs.is_release != 'true'
        run: |
          echo "Not a release commit; skip tag." && exit 0
        shell: bash

      - name: Resolve previous stable tag
        id: previous_tag
        if: steps.release_guard.outputs.is_release == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          current_tag="${{ steps.create_tag.outputs.tag || steps.manual_release.outputs.tag || format('v{0}', steps.release_guard.outputs.version) }}"
          tags=$(git tag --list 'v*' --sort=v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' || true)
          prev=$(echo "$tags" | grep -vx "$current_tag" | tail -n 1)
          echo "previous_tag=$prev" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        id: create_tag
        if: github.event_name == 'workflow_run' && steps.release_guard.outputs.is_release == 'true'
        run: |
          tag="v${{ steps.release_guard.outputs.version }}"
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git tag -a "$tag" -m "Release ${{ steps.release_guard.outputs.version }}"
          git push origin "$tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: release_notes
        if: steps.release_guard.outputs.is_release == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/github-script@v8
        env:
          RELEASE_TAG: ${{ steps.create_tag.outputs.tag || steps.manual_release.outputs.tag }}
          PREVIOUS_TAG: ${{ steps.previous_tag.outputs.previous_tag }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const previousTag = process.env.PREVIOUS_TAG;
            const params = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
            };
            if (previousTag) {
              params.previous_tag_name = previousTag;
            }
            const { data } = await github.rest.repos.generateReleaseNotes(params);
            core.setOutput("release_body", data.body ?? "");

      # Release target 矩阵只在这里维护一份，桌面端与 CLI 共享，
      # 避免新增/删减平台时出现两处配置漂移。
      - name: Export release matrix
        id: release_matrix
        if: steps.release_guard.outputs.is_release == 'true' || github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          {
            echo 'matrix<<EOF'
            cat .github/release-matrix.json
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

  stable_release:
    name: Release (${{ matrix.platform }} / ${{ matrix.target }})
    needs: [stable_tag, stable_release_bootstrap]
    if: needs.stable_tag.outputs.tag != ''
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.stable_tag.outputs.release_matrix) }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.stable_tag.outputs.tag }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          architecture: ${{ matrix.node_arch }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      # macos-latest 是 GitHub-hosted 的 Apple Silicon (arm64) runner；
      # 显式指定 Node 为 arm64，避免在 Rosetta/x64 Node 下导致 tauri/产物架构误判。
      - name: Verify macOS (arm64) runner & Node arch
        if: matrix.platform == 'macos-latest'
        shell: bash
        run: |
          echo "uname -m: $(uname -m)"
          echo "node process.arch: $(node -p 'process.arch')"
          if [ "$(uname -m)" != "arm64" ]; then
            echo "Expected macos-latest to be arm64 (Apple Silicon) runner." >&2
            exit 1
          fi
          if [ "$(node -p 'process.arch')" != "arm64" ]; then
            echo "Expected arm64 Node on macos-latest; otherwise tauri may run under Rosetta and produce wrong artifacts." >&2
            exit 1
          fi

      - name: Ensure pnpm store directory exists
        run: node scripts/ensure-pnpm-store.mjs

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest' || matrix.platform == 'ubuntu-24.04-arm'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"
          cache-on-failure: true
          # Stable cache key for release reuse; bump suffix to invalidate.
          shared-key: "rust-${{ runner.os }}-${{ matrix.target }}-v2"
          add-job-id-key: "false"
          add-rust-environment-hash-key: "false"
          # Do not restore ~/.cargo/bin; a poisoned macOS cache can shadow cargo with rustup-init.
          cache-bin: "false"

      - name: Build and release
        uses: tauri-apps/tauri-action@v0.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tauriScript: "pnpm tauri"
          args: "--target ${{ matrix.target }}"
          includeUpdaterJson: false
          tagName: "${{ needs.stable_tag.outputs.tag }}"
          releaseName: "Release ${{ needs.stable_tag.outputs.version }}"
          releaseBody: ${{ needs.stable_tag.outputs.release_notes }}
          releaseDraft: ${{ needs.stable_release_bootstrap.outputs.release_draft }}
          prerelease: false
          generateReleaseNotes: false

      # macOS 自动更新目前只消费桌面端产物，因此 latest.json 仍只依赖桌面端 release job。
      # CLI 构建与上传在独立 job 中并行执行，避免被 Tauri 打包串行阻塞。
      - name: Verify macOS (aarch64) updater assets uploaded
        if: matrix.target == 'aarch64-apple-darwin'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_ID: ${{ needs.stable_release_bootstrap.outputs.release_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          expected=(
            "Token.Proxy_aarch64.app.tar.gz"
            "Token.Proxy_aarch64.app.tar.gz.sig"
          )
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}/assets?per_page=100"

          for attempt in {1..12}; do
            names="$(
              curl -fsSL \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "Accept: application/vnd.github+json" \
                "$api" \
              | node -e 'const assets=JSON.parse(require("fs").readFileSync(0,"utf8")); console.log((assets ?? []).map(a => a.name).join("\n"));'
            )"

            missing=()
            for name in "${expected[@]}"; do
              echo "$names" | grep -qx "$name" || missing+=("$name")
            done

            if [ ${#missing[@]} -eq 0 ]; then
              echo "All expected macOS (aarch64) updater assets are present."
              exit 0
            fi

            echo "Waiting for release assets: ${missing[*]} (attempt ${attempt}/12)"
            sleep 5
          done

          echo "Missing expected macOS (aarch64) updater assets after retries: ${missing[*]}" >&2
          exit 1

  # 先创建 release 条目，再让桌面端与 CLI 并行上传资产。
  # 这样可以彻底消除“tag 已推送但 release 尚未创建”这类竞态，
  # 同时保留 CLI 与桌面端并行构建的吞吐。
  stable_release_bootstrap:
    name: Bootstrap GitHub Release
    needs: stable_tag
    if: needs.stable_tag.outputs.tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_draft: ${{ steps.ensure_release.outputs.release_draft }}
      release_id: ${{ steps.ensure_release.outputs.release_id }}
    steps:
      - name: Ensure GitHub Release exists
        id: ensure_release
        uses: actions/github-script@v8
        env:
          RELEASE_TAG: ${{ needs.stable_tag.outputs.tag }}
          RELEASE_NAME: Release ${{ needs.stable_tag.outputs.version }}
          RELEASE_BODY: ${{ needs.stable_tag.outputs.release_notes }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const createAsDraft = context.eventName === "workflow_run";

            try {
              const { data } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              core.setOutput("release_draft", String(Boolean(data.draft)));
              core.setOutput("release_id", String(data.id));
              core.info(
                `Release ${tag} already exists (#${data.id}, draft=${Boolean(data.draft)}).`
              );
              return;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const existingDraft = releases.find((release) => release.tag_name === tag);
            if (existingDraft) {
              core.setOutput("release_draft", String(Boolean(existingDraft.draft)));
              core.setOutput("release_id", String(existingDraft.id));
              core.info(
                `Resolved existing release ${tag} from release list (#${existingDraft.id}, draft=${Boolean(existingDraft.draft)}).`
              );
              return;
            }

            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: process.env.RELEASE_NAME,
              body: process.env.RELEASE_BODY ?? "",
              draft: createAsDraft,
              prerelease: false,
            });

            core.setOutput("release_draft", String(Boolean(data.draft)));
            core.setOutput("release_id", String(data.id));
            core.info(
              `Release ${tag} created (#${data.id}, draft=${Boolean(data.draft)}) before parallel asset uploads.`
            );

  stable_cli_release:
    name: Release CLI (${{ matrix.platform }} / ${{ matrix.target }})
    needs: [stable_tag, stable_release_bootstrap]
    if: needs.stable_tag.outputs.tag != ''
    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.stable_tag.outputs.release_matrix) }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.stable_tag.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri"
          cache-on-failure: true
          shared-key: "rust-${{ runner.os }}-${{ matrix.target }}-v2"
          add-job-id-key: "false"
          add-rust-environment-hash-key: "false"
          # Do not restore ~/.cargo/bin; a poisoned macOS cache can shadow cargo with rustup-init.
          cache-bin: "false"

      - name: Build CLI binary
        run: cargo build -p token_proxy_cli --release --locked --target ${{ matrix.target }}

      - name: Verify CLI binary
        if: runner.os != 'Windows'
        shell: bash
        run: ./target/${{ matrix.target }}/release/token-proxy --help >/dev/null

      - name: Verify CLI binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\target\${{ matrix.target }}\release\token-proxy.exe --help > $null

      - name: Package CLI archive
        id: cli_asset_unix
        if: runner.os != 'Windows'
        shell: bash
        env:
          VERSION: ${{ needs.stable_tag.outputs.version }}
          TARGET: ${{ matrix.target }}
        run: |
          mkdir -p dist/cli
          asset_name="token-proxy_cli_${VERSION}_${TARGET}.tar.gz"
          tar -C "target/${TARGET}/release" -czf "dist/cli/${asset_name}" token-proxy
          echo "asset_path=dist/cli/${asset_name}" >> "$GITHUB_OUTPUT"
          echo "asset_name=${asset_name}" >> "$GITHUB_OUTPUT"

      - name: Package CLI archive (Windows)
        id: cli_asset_windows
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          VERSION: ${{ needs.stable_tag.outputs.version }}
          TARGET: ${{ matrix.target }}
        run: |
          New-Item -ItemType Directory -Force -Path dist/cli | Out-Null
          $assetName = "token-proxy_cli_$env:VERSION" + "_$env:TARGET.zip"
          Compress-Archive -Path "target/$env:TARGET/release/token-proxy.exe" -DestinationPath "dist/cli/$assetName" -Force
          "asset_path=dist/cli/$assetName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "asset_name=$assetName" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload CLI archive
        if: runner.os != 'Windows'
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.stable_tag.outputs.tag }}" "${{ steps.cli_asset_unix.outputs.asset_path }}" --clobber

      - name: Upload CLI archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ needs.stable_tag.outputs.tag }}" "${{ steps.cli_asset_windows.outputs.asset_path }}" --clobber

  stable_updater_json:
    name: Generate updater latest.json
    needs: [stable_tag, stable_release_bootstrap, stable_release]
    if: needs.stable_tag.outputs.tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.stable_tag.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Generate and upload latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ needs.stable_release_bootstrap.outputs.release_id }}
          TAG_NAME: ${{ needs.stable_tag.outputs.tag }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/generate-updater-json.mjs

  stable_release_publish:
    name: Publish GitHub Release
    needs:
      [
        stable_tag,
        stable_release_bootstrap,
        stable_release,
        stable_cli_release,
        stable_updater_json,
      ]
    if: |
      needs.stable_tag.outputs.tag != '' &&
      needs.stable_release_bootstrap.outputs.release_draft == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish release after all assets are ready
        uses: actions/github-script@v8
        env:
          RELEASE_ID: ${{ needs.stable_release_bootstrap.outputs.release_id }}
          RELEASE_TAG: ${{ needs.stable_tag.outputs.tag }}
        with:
          script: |
            const releaseId = Number(process.env.RELEASE_ID);
            if (!Number.isFinite(releaseId) || releaseId <= 0) {
              throw new Error(`Invalid RELEASE_ID: ${process.env.RELEASE_ID}`);
            }

            const { data } = await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: releaseId,
              draft: false,
              prerelease: false,
            });

            core.info(
              `Release ${process.env.RELEASE_TAG} published (#${data.id}) after updater assets and latest.json were ready.`
            );

      - name: Mark release as latest
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: gh release edit "${{ needs.stable_tag.outputs.tag }}" --repo "${{ github.repository }}" --latest

  prepare_release_pr:
    name: Prepare release PR
    if: github.event_name == 'workflow_dispatch' && inputs.republish != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate and bump version
        id: versioning
        run: node scripts/versioning.mjs release "${{ inputs.version }}"

      - name: Create release branch and commit
        id: commit
        run: |
          version="${{ steps.versioning.outputs.version }}"
          branch="release/v${version}"
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git fetch origin "$branch" || true
          git switch -C "$branch"
          git add package.json src-tauri/Cargo.toml src-tauri/tauri.conf.json Cargo.lock
          git commit -m "chore: release v${version}"
          git push --force-with-lease=refs/heads/$branch origin "HEAD:$branch"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        uses: actions/github-script@v8
        env:
          BRANCH: ${{ steps.commit.outputs.branch }}
          VERSION: ${{ steps.versioning.outputs.version }}
        with:
          script: |
            const branch = process.env.BRANCH;
            const version = process.env.VERSION;
            const title = `chore: release v${version}`;
            const body = [
              `## Release v${version}`,
              "- Auto-generated release PR; merging will tag and publish the final release.",
              "- Merge only after CI passes.",
            ].join("\n");
            const { data } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: branch,
              base: "main",
              title,
              body,
              maintainer_can_modify: true,
            });
            core.setOutput("pr_url", data.html_url);
